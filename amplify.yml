version: 1
frontend:
  phases:
    preBuild:
      commands:
        - corepack enable
        - pnpm install --frozen-lockfile
    build:
      commands:
        - env | grep -e OPENAI_API_KEY -e OPENAI_MODEL > .env.production
        - env | grep -e NEXT_PUBLIC_ >> .env.production || true
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
